<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orders</title>

    <style>
        /* RESET */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        /* BODY */
        
        body {
            background: linear-gradient(135deg, #f1f5f9, #dbeafe);
            min-height: 100vh;
            padding: 15px;
        }
        /* HEADER */
        
        h2 {
            text-align: center;
            color: #fff;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 15px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 6px 15px rgba(0, 0, 0, .15);
            text-shadow: 0 0 10px rgba(235, 37, 222, 0.5);
        }
        /* SEARCH BAR */
        
        .search {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 1000;
        }
        
        #search {
            width: 100%;
            max-width: 450px;
            padding: 12px 18px;
            border: 2px solid #2563eb;
            border-radius: 30px;
            outline: none;
            font-size: 15px;
            background: #fff;
            color: #1e293b;
            transition: .3s;
        }
        
        #search::placeholder {
            color: #64748b;
        }
        
        #search:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 8px rgba(37, 99, 235, .3);
        }
        /* CARD */
        
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 18px;
            border-left: 6px solid #2563eb;
            box-shadow: 0 8px 18px rgba(0, 0, 0, .08);
            transition: .3s;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, .15);
        }
        /* NAME */
        
        .name {
            font-size: 22px;
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 10px;
        }
        /* PHONE */
        
        .phone {
            color: #16a34a;
            font-weight: bold;
            margin-bottom: 10px;
        }
        /* TEXT */
        
        .card p {
            color: #334155;
            margin: 6px 0;
            font-size: 15px;
        }
        /* ITEMS */
        
        .items {
            margin-top: 12px;
            padding: 12px;
            background: #eff6ff;
            border-radius: 12px;
            color: #1e40af;
            font-weight: bold;
            line-height: 1.6;
        }
        /* TOTAL */
        
        .total {
            margin-top: 15px;
            padding: 12px;
            text-align: center;
            background: #dcfce7;
            color: #15803d;
            font-weight: bold;
            border-radius: 12px;
            font-size: 2px;
        }
        /* DELIVERY */
        
        .delivery {
            margin-top: 12px;
            padding: 10px;
            text-align: center;
            background: #ffedd5;
            color: #c2410c;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
        }
        /* ORDER TYPE */
        
        .order-type {
            margin-top: 12px;
            padding: 10px;
            text-align: center;
            background: #ede9fe;
            color: #6d28d9;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
        }
        /* BADGE */
        
        .badge {
            display: inline-block;
            padding: 5px 12px;
            background: #dbeafe;
            color: #1d4ed8;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        /* EMPTY */
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-size: 18px;
        }
        /* DELIVERED CARD */
        
        .delivered {
            opacity: .8;
            border-left: 6px solid #22c55e;
        }
        
        .delivered .badge {
            background: #dcfce7;
            color: #15803d;
        }
        
        .delivered .delivery {
            background: #dcfce7;
            color: #15803d;
        }
        /* DONE CHECKBOX */
        
        .done-box {
            margin-top: 15px;
            text-align: center;
            font-size: 17px;
            font-weight: bold;
        }
        
        .done-box input {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #22c55e;
        }
        /* BUTTONS */
        
        button {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: .3s;
        }
        
        button:hover {
            background: #1d4ed8;
        }
        /* MOBILE */
        
        @media(max-width:768px) {
            body {
                padding: 10px;
            }
            h2 {
                font-size: 22px;
            }
            #search {
                width: 100%;
            }
            .card {
                padding: 15px;
            }
            .name {
                font-size: 20px;
            }
            .total {
                font-size: 20px;
            }
            .delivery,
            .order-type {
                font-size: 16px;
            }
        }
    </style>

</head>

<body>

    <h2>Bautista Shop Food Order Management </h2>


    <div id="orders"></div>

    <input type="text" class="search" id="search" placeholder="🔍 Search Name, Phone, Address or Date (6/25/2026)" onkeyup="searchCustomer()">

    <footer style="position: fixed; bottom: 2px; left: 10%; top:20px; transform: translateX(-50%);">
        <button style="padding: 10px 20px; border: none; border-radius: 8px 10px;background: linear-gradient(135deg, #161719, #011e24);
">
        <a href="index.html" style="color: #edf1f1; text-decoration: none; font-size: 13px;">
            <-Back
        </a>
    </button>
    </footer>




    <script>
        const url = "https://script.google.com/macros/s/AKfycbxhY81dzMziv2WlER2JUTRIwzfr541q0v136nf8qmxLm5BmPRtUOJq_ndTyHltUPnuQ2Q/exec";

        let orders = [];

        fetch(url)
            .then(res => res.json())
            .then(data => {

                orders = data.records.reverse();

                displayOrders(orders);

            })
            .catch(error => {

                document.getElementById("orders").innerHTML =
                    `<div class="empty">❌ Failed to load orders</div>`;

                console.error(error);

            });

        function displayOrders(data) {

            let html = "";

            if (data.length === 0) {

                html = `
        <div class="empty">
            🔍 No orders found
        </div>
        `;

                document.getElementById("orders").innerHTML = html;
                return;
            }

            data.forEach(order => {

                html += `
        <div class="card">

            <div class="badge">NEW ORDER</div>

            <div class="name">
                👤 NAME: ${order.name || ""}
            </div>

            <div class="phone">
                📞NUMBER: ${order.phone || ""}
            </div>

            <p>📍LOCATION :${order.address || ""}</p>

            <p>📅DATE: ${order.date || ""}</p>

            <p>⏰ TIME: ${order.time || ""}</p>

            <div class="items">
                🛒 <b>Ordered Items</b><br><br>
                ${order.items || ""}
            </div>

            <div class="total">
                All Total: ₱${order.total || "0"}
            </div>

            <div class="delivery">
                🚚 Delivery:${order.deliver || ""}
            </div>

            <div class="order-type">
                📦 Order Type: ${order.orderType || ""}
            </div>

              <div class="order-type">
            Tracker: ${order.location || ""}
            </div>

            

<div class="done-box">
<label>
<input type="checkbox" onchange="markDone(this)">
 ✔ Delivered
</label>
</div>

        </div>
        `;
            });

            document.getElementById("orders").innerHTML = html;
        }

        //CHECK BOX IF DONE CUSTOMER
        function markDone(box) {

            let card = box.closest(".card");

            if (box.checked) {

                card.classList.add("delivered");

                card.querySelector(".badge").innerHTML = "✅ DELIVERED";

            } else {

                card.classList.remove("delivered");

                card.querySelector(".badge").innerHTML = "NEW ORDER";

            }

        }

        // Auto refresh every 30 seconds only if not searching
        let refreshTimer = setInterval(refreshPage, 40000);

        function refreshPage() {
            if (document.getElementById("search").value.trim() === "") {
                location.reload();
            }
        }
        //searchCustomer
        function searchCustomer() {

            let keyword = document
                .getElementById("search")
                .value
                .toLowerCase()
                .trim();

            let filtered = orders.filter(order => {

                const name = String(order.name || "").toLowerCase();
                const phone = String(order.phone || "").toLowerCase();
                const address = String(order.address || "").toLowerCase();
                const date = String(order.date || "").toLowerCase();

                return (
                    name.includes(keyword) ||
                    phone.includes(keyword) ||
                    address.includes(keyword) ||
                    date.includes(keyword)
                );
            });

            displayOrders(filtered);


        }
    </script>

</body>

</html>
